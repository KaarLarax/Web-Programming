<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Coditional Statements JS IF-THEN-ELSE</title>
        <meta charset="utf-8" />
        <style>
            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background-color: rgb(180, 180, 180);
                color: rgb(0, 0, 0);
            }
            h1 {
                text-align: center;
                color: rgb(0, 71, 101);
                text-shadow: 2px 2px 4px rgb(80, 83, 151);
            }
            h2 {
                text-align: justify;
                color: rgb(64, 9, 56);
            }
            input {
                margin: 5px;
                padding: 10px;
                border: 2px solid rgb(0, 71, 101);
                border-radius: 5px;
            }
            button {
                padding: 10px 20px;
                margin: 5px;
                background-color: rgb(0, 71, 101);
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <h1>Conditional Statements in JavaScript</h1>
        <center><img
            src="./if_then_else.jpg"
            alt="Flowchart showing IF THEN ELSE conditional logic with arrows connecting decision points and outcomes. The diagram is set against a plain background and the mood is instructional. Text in the image reads IF THEN ELSE."
            style="
                display: block;
                text-align: center;
                width: 200px;
                height: auto;
            "
        /></center>
        <h2>Give me three numbers</h2>
        <form>
            <input type="number" id="num1" placeholder="First number" />
            <input type="number" id="num2" placeholder="Second number" />
            <input type="number" id="num3" placeholder="Third number" />
            <button type="button" onclick="checkNumbers()">
                Check Numbers
            </button>
        </form>
        <p id="result"></p>
        <script>
            function checkNumbers() {
                const num1 = parseFloat(document.getElementById("num1").value);
                const num2 = parseFloat(document.getElementById("num2").value);
                const num3 = parseFloat(document.getElementById("num3").value);
                let result = "";

                if (isNaN(num1) || isNaN(num2) || isNaN(num3)) {
                    result = "Please enter valid numbers in all fields.";
                } else if (num1 === num2 && num2 === num3) {
                    result = "All three numbers are equal.";
                } else if (num1 === num2 || num1 === num3 || num2 === num3) {
                    result = "Two of the numbers are equal.";
                } else {
                    result = "All three numbers are different.";
                }
                document.getElementById("result").innerText = result;
            }
        </script>
        <noscript>
            <p>Please enable JavaScript to use this feature.</p>
        </noscript>
    </body>
</html>
