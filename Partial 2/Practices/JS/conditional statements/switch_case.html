<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Conditional Statements Switch Case</title>
        <meta charset="utf-8" />
        <style>
            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background-color: rgb(180, 180, 180);
                color: rgb(0, 0, 0);
            }
            h1 {
                text-align: center;
                color: rgb(0, 71, 101);
                text-shadow: 2px 2px 4px rgb(80, 83, 151);
            }
            h2 {
                text-align: justify;
                color: rgb(64, 9, 56);
            }
            input {
                margin: 5px;
                padding: 10px;
                border: 2px solid rgb(0, 71, 101);
                border-radius: 5px;
            }
            button {
                padding: 10px 20px;
                margin: 5px;
                background-color: rgb(0, 71, 101);
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <h1>Switch Case in JavaScript</h1>
        <center><img src="./the months of the year.png" alt="The months of the year" style="display: block; text-align: center; width: 200px; height: auto;" /></center>
        <h2>Give the number of a month</h2>
        <form>
            <input type="number" id="month" placeholder="month number" />
            <button type="button" onclick="showMonth()">Show Month</button>
            <p id="result"></p>
            <script>
                function showMonth() {
                    var monthNumber;
                    try {
                        monthNumber = parseInt(
                            document.getElementById("month").value
                        );
                    } catch (e) {
                        document.getElementById("result").innerText =
                            "Please enter a valid number";
                        return;
                    }
                    let monthName;
                    switch (monthNumber) {
                        case 1:
                            monthName = "January";
                            break;
                        case 2:
                            monthName = "February";
                            break;
                        case 3:
                            monthName = "March";
                            break;
                        case 4:
                            monthName = "April";
                            break;
                        case 5:
                            monthName = "May";
                            break;
                        case 6:
                            monthName = "June";
                            break;
                        case 7:
                            monthName = "July";
                            break;
                        case 8:
                            monthName = "August";
                            break;
                        case 9:
                            monthName = "September";
                            break;
                        case 10:
                            monthName = "October";
                            break;
                        case 11:
                            monthName = "November";
                            break;
                        case 12:
                            monthName = "December";
                            break;
                        default:
                            monthName = "Invalid month number";
                    }
                    document.getElementById("result").innerText = monthName;
                }
            </script>
        </form>
    </body>
</html>
