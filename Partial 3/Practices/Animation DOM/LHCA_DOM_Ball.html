<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Random Moving Ball — DOM Animation</title>
        <style>
            :root {
                --bg: #0b1221;
                --panel: #0f1724;
                --ball: #ff6b6b;
            }
            html,
            body {
                height: 100%;
                margin: 0;
                font-family: system-ui, Segoe UI, Roboto, Arial;
            }
            .wrap {
                display: flex;
                gap: 1rem;
                align-items: flex-start;
                padding: 2rem;
                background: linear-gradient(180deg, #071021 0%, #0b1221 100%);
                min-height: 100%;
                box-sizing: border-box;
                color: #dbeafe;
            }
            .stage {
                position: relative;
                width: 880px;
                height: 520px;
                background: linear-gradient(
                    180deg,
                    rgba(255, 255, 255, 0.02),
                    rgba(0, 0, 0, 0.12)
                );
                border: 2px solid rgba(255, 255, 255, 0.06);
                border-radius: 8px;
                box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6) inset,
                    0 8px 30px rgba(2, 6, 23, 0.4);
                overflow: hidden;
            }
            .controls {
                width: 280px;
                padding: 1rem;
                background: rgba(255, 255, 255, 0.02);
                border-radius: 8px;
                border: 1px solid rgba(255, 255, 255, 0.03);
            }
            .ball {
                position: absolute;
                width: 48px;
                height: 48px;
                border-radius: 50%;
                background: radial-gradient(
                    circle at 30% 30%,
                    #fff 6%,
                    var(--ball) 35%,
                    #c43a3a 100%
                );
                box-shadow: 0 8px 18px rgba(0, 0, 0, 0.45),
                    0 2px 6px rgba(255, 255, 255, 0.06) inset;
                transform: translate3d(0, 0, 0);
            }
            .info {
                font-size: 0.9rem;
                opacity: 0.9;
            }
            label {
                display: block;
                margin: 0.4rem 0;
            }
            input[type="range"] {
                width: 100%;
            }
            button {
                margin-top: 0.5rem;
                padding: 0.45rem 0.6rem;
                border-radius: 6px;
                border: 1px solid rgba(255, 255, 255, 0.06);
                background: #0b1228;
                color: #dbeafe;
                cursor: pointer;
            }
            small {
                opacity: 0.8;
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <div class="stage" id="stage" aria-label="Animation stage">
                <div
                    id="ball"
                    class="ball"
                    role="img"
                    aria-label="Moving ball"
                ></div>
            </div>

            <aside class="controls">
                <h3>Random Ball Controls</h3>
                <div class="info">
                    <label
                        >Speed: <small id="speedVal">200</small> px/s
                        <input
                            id="speed"
                            type="range"
                            min="50"
                            max="700"
                            value="200"
                        />
                    </label>
                    <label
                        >Bounciness (0-1): <small id="bounceVal">0.92</small>
                        <input
                            id="bounciness"
                            type="range"
                            min="0.5"
                            max="0.98"
                            step="0.01"
                            value="0.92"
                        />
                    </label>
                    <label
                        >Randomness (0-1): <small id="rndVal">0.2</small>
                        <input
                            id="randomness"
                            type="range"
                            min="0"
                            max="1"
                            step="0.01"
                            value="0.2"
                        />
                    </label>
                    <label
                        >Change direction interval (s):
                        <small id="dirVal">1.8</small>
                        <input
                            id="dirInterval"
                            type="range"
                            min="0.2"
                            max="6"
                            step="0.1"
                            value="1.8"
                        />
                    </label>
                    <button id="toggle">Pause</button>
                </div>
                <p style="margin-top: 1rem; font-size: 0.85rem; color: #9fb0d9">
                    Open this file in a browser. The ball moves and bounces off
                    the stage edges. Use controls to tweak behavior.
                </p>
            </aside>
        </div>

        <script>
            const stage = document.getElementById("stage");
            const ball = document.getElementById("ball");
            const speedInput = document.getElementById("speed");
            const bouncinessInput = document.getElementById("bounciness");
            const randomnessInput = document.getElementById("randomness");
            const dirInput = document.getElementById("dirInterval");
            const toggleBtn = document.getElementById("toggle");
            const speedVal = document.getElementById("speedVal");
            const bounceVal = document.getElementById("bounceVal");
            const rndVal = document.getElementById("rndVal");
            const dirVal = document.getElementById("dirVal");

            const state = {
                x: 50,
                y: 50,
                vx: 0,
                vy: 0,
                radius: 24,
                paused: false,
                lastTime: null,
                nextDirChange: 0,
            };

            function resetPosition() {
                const rect = stage.getBoundingClientRect();
                state.x = rect.width * 0.5;
                state.y = rect.height * 0.5;
                const a = Math.random() * Math.PI * 2;
                const s = Number(speedInput.value);
                state.vx = Math.cos(a) * s;
                state.vy = Math.sin(a) * s;
                updateBallDOM();
            }

            function updateBallDOM() {
                ball.style.transform = `translate(${
                    state.x - state.radius
                }px, ${state.y - state.radius}px)`;
            }

            function clamp(v, a, b) {
                return Math.max(a, Math.min(b, v));
            }

            function randomizeDirection(mix) {
                const ang = Math.random() * Math.PI * 2;
                const rnd = { x: Math.cos(ang), y: Math.sin(ang) };
                state.vx =
                    state.vx * (1 - mix) +
                    rnd.x * Number(speedInput.value) * mix;
                state.vy =
                    state.vy * (1 - mix) +
                    rnd.y * Number(speedInput.value) * mix;
            }

            function animate(t) {
                if (state.paused) {
                    state.lastTime = t;
                    requestAnimationFrame(animate);
                    return;
                }
                if (!state.lastTime) state.lastTime = t;
                const dt = (t - state.lastTime) / 1000;
                state.lastTime = t;

                const targetSpeed = Number(speedInput.value);
                const curSpeed = Math.hypot(state.vx, state.vy) || 1;
                const speedFactor = targetSpeed / curSpeed;
                state.vx *= speedFactor;
                state.vy *= speedFactor;

                state.nextDirChange -= dt;
                if (state.nextDirChange <= 0) {
                    randomizeDirection(Number(randomnessInput.value));
                    state.nextDirChange = Number(dirInput.value);
                }

                state.x += state.vx * dt;
                state.y += state.vy * dt;

                const rect = stage.getBoundingClientRect();
                const minX = state.radius;
                const minY = state.radius;
                const maxX = rect.width - state.radius;
                const maxY = rect.height - state.radius;

                let bounced = false;
                if (state.x < minX) {
                    state.x = minX;
                    state.vx = -state.vx * Number(bouncinessInput.value);
                    bounced = true;
                } else if (state.x > maxX) {
                    state.x = maxX;
                    state.vx = -state.vx * Number(bouncinessInput.value);
                    bounced = true;
                }
                if (state.y < minY) {
                    state.y = minY;
                    state.vy = -state.vy * Number(bouncinessInput.value);
                    bounced = true;
                } else if (state.y > maxY) {
                    state.y = maxY;
                    state.vy = -state.vy * Number(bouncinessInput.value);
                    bounced = true;
                }

                if (bounced) {
                    randomizeDirection(
                        Math.min(0.25, Number(randomnessInput.value) + 0.05)
                    );
                }

                updateBallDOM();

                requestAnimationFrame(animate);
            }

            speedInput.addEventListener("input", () => {
                speedVal.textContent = speedInput.value;
            });
            bouncinessInput.addEventListener("input", () => {
                bounceVal.textContent = bouncinessInput.value;
            });
            randomnessInput.addEventListener("input", () => {
                rndVal.textContent = randomnessInput.value;
            });
            dirInput.addEventListener("input", () => {
                dirVal.textContent = dirInput.value;
            });

            toggleBtn.addEventListener("click", () => {
                state.paused = !state.paused;
                toggleBtn.textContent = state.paused ? "Resume" : "Pause";
            });

            let resizeTimer;
            window.addEventListener("resize", () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    const rect = stage.getBoundingClientRect();
                    state.x = clamp(
                        state.x,
                        state.radius,
                        rect.width - state.radius
                    );
                    state.y = clamp(
                        state.y,
                        state.radius,
                        rect.height - state.radius
                    );
                    updateBallDOM();
                }, 120);
            });

            window.addEventListener("keydown", (e) => {
                if (e.code === "Space") {
                    e.preventDefault();
                    toggleBtn.click();
                }
            });

            resetPosition();
            state.nextDirChange = Number(dirInput.value);
            requestAnimationFrame(animate);
        </script>
    </body>
</html>
