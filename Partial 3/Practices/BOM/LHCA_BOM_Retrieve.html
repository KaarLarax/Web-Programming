<!DOCTYPE html>
<html>
    <head>
        <title>General Data</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            body {
                text-align: center;
            }
        </style>
    </head>
    <body>
        <h1>General Data</h1>
        <h2>My screen's width and height</h2>
        <p id="widthandheight"></p>
        <h2>My current URL</h2>
        <p id="url"></p>
        <h2>My browser's name and version</h2>
        <p id="browser"></p>
        <h2>Year when I've created this page</h2>
        <p id="date"></p>
        <script>
            document.getElementById("widthandheight").innerHTML =
                "Width: " + screen.width + ", Height: " + screen.height;
            document.getElementById("url").innerHTML = document.URL;
            document.getElementById("browser").innerHTML =
                navigator.appName + ", Version: " + navigator.appVersion;
            var creationDate = new Date(2025, 9, 15);
            var options = { year: "numeric", month: "long", day: "numeric" };
            document.getElementById("date").innerHTML =
                creationDate.toLocaleDateString("en", options);
        </script>
    </body>
</html>
