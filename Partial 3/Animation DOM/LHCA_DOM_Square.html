<!DOCTYPE html>
<html>
    <style>
        #container {
            width: 400px;
            height: 400px;
            position: relative;
            background-color: rgb(94, 32, 32);
        }

        #animate {
            width: 50px;
            height: 50px;
            position: absolute;
            right: 350px;
            top: 350px;
            background-color: rgb(82, 28, 66);
        }
        button {
            background-color: rgb(82, 28, 66);
            color: white;
            font-size: 20px;
            border-radius: 12px;
            padding: 10px 24px;
            cursor: pointer;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: rgb(200, 200, 200);
        }
    </style>
    <body>
        <p>
            <button onclick="myMove()">Click Me</button>
        </p>
        <div id="container">
            <div id="animate"></div>
        </div>
        <script>
            function myMove() {
                var elem = document.getElementById("animate");
                var pos = 350;
                var id = setInterval(frame, 5);
                function frame() {
                    if (pos == 0) {
                        clearInterval(id);
                    } else {
                        pos--;
                        elem.style.top = pos + "px";
                        elem.style.right = pos + "px";
                    }
                }
            }
        </script>
    </body>
</html>
