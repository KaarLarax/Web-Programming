<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Página con Bootstrap (CDN) - Corregida</title>

  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* pequeñas reglas propias para la demo */
    body { min-height: 100vh; display:flex; align-items:center; justify-content:center; background:#f8f9fa; }
    .card-demo { width: 22rem; }
  </style>
</head>
<body>

  <div class="card card-demo shadow-sm text-center">
    <div class="card-body">
      <h3 class="card-title mb-2">Hola Mundo 🌍</h3>
      <p class="card-text mb-3">Página con Bootstrap usando CDN — botón cambia color del fondo.</p>
      <button id="colorBtn" class="btn btn-primary">Cambiar color</button>
    </div>
  </div>

  <!-- Bootstrap Bundle (JS + Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // script sencillo para cambiar color de fondo
    document.getElementById('colorBtn').addEventListener('click', () => {
      // color hex aleatorio de 6 dígitos (si el string sale corto, rellenamos)
      const c = Math.floor(Math.random() * 0xFFFFFF).toString(16).padStart(6,'0');
      document.body.style.backgroundColor = '#' + c;
    });
  </script>
</body>
</html>
