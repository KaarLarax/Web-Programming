<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ejemplo Bootstrap Básico</title>
        <!-- Enlace CDN de Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>
    <body class="bg-light text-dark">
        <div class="container mt-5">
            <h1 class="text-center mb-4">
                Ejemplo de Tags Básicas de Bootstrap
            </h1>

            <div class="row">
                <div class="col-md-6 bg-primary text-white p-3 rounded shadow">
                    <h2 class="h4">Columna 1</h2>
                    <p class="lead">
                        Texto dentro de un contenedor Bootstrap con color de
                        fondo y sombra.
                    </p>
                </div>
                <div class="col-md-6 bg-success text-white p-3 rounded shadow">
                    <h2 class="h4">Columna 2</h2>
                    <p class="lead">
                        Bootstrap permite dividir contenido fácilmente usando
                        filas y columnas.
                    </p>
                </div>
            </div>

            <div class="text-center mt-4">
                <button class="btn btn-primary m-2">Aceptar</button>
                <button class="btn btn-outline-danger m-2">Cancelar</button>
            </div>

            <div class="text-center mt-5">
                <img
                    src="https://cdn2.mediotiempo.com/uploads/media/2021/08/27/cristiano-ronaldo-gano-champions-red.jpg"
                    class="img-fluid rounded-circle border shadow"
                    alt="Ejemplo imagen"
                />
                <p class="mt-3 text-muted">
                    Ejemplo de imagen con clase <code>.rounded-circle</code> y
                    <code>.img-fluid</code>.
                </p>
            </div>
        </div>

        <!-- Script de Bootstrap -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
