<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Página con Bootstrap Local</title>

        <!-- Bootstrap local -->
        <link
            rel="stylesheet"
            href="./bootstrap-5.3.8-dist/css/bootstrap.min.css"
        />
    </head>
    <body class="d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow p-4 text-center" style="width: 20rem">
            <h1 class="mb-3">Hola Mundo 🌍</h1>
            <p>Esta es una página con Bootstrap descargado.</p>
            <button id="colorBtn" class="btn btn-success">Cambiar color</button>
        </div>

        <script>
            document
                .getElementById("colorBtn")
                .addEventListener("click", () => {
                    document.body.style.backgroundColor =
                        "#" + Math.floor(Math.random() * 16777215).toString(16);
                });
        </script>

        <script src="./bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
